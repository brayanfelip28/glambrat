<!DOCTYPE html>
<html lang="es">
<head>
  <title>Glambrat | Accesorios de Belleza en Colombia</title>
  <meta name="description" content="Glambrat co - La mejor tienda de accesorios de belleza.">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{--pink:#e8389a;--pink-light:#f472c0;--purple:#7c3fc4;--purple-deep:#4e1a8a;--blue:#3e8fe8;--blue-bright:#5bb8ff;--yellow:#ffd84d;--white:#fff;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#f9a8e8 0%,#d46ff0 35%,#7c3fc4 70%,#4e1a8a 100%);min-height:100vh;color:#fff;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 15% 25%,rgba(255,255,255,.12) 1px,transparent 1px),radial-gradient(circle at 75% 15%,rgba(255,255,255,.10) 1.5px,transparent 1.5px),radial-gradient(circle at 45% 70%,rgba(255,255,255,.08) 1px,transparent 1px),radial-gradient(circle at 85% 55%,rgba(255,255,255,.12) 2px,transparent 2px);background-size:300px 300px,200px 200px,400px 400px,250px 250px;pointer-events:none;z-index:0;}
 
    /* ── HEADER ── */
    header{position:sticky;top:0;z-index:100;background:rgba(78,26,138,.9);backdrop-filter:blur(16px);border-bottom:2px solid rgba(255,255,255,.18);}
    .header-top{display:flex;justify-content:space-between;align-items:center;padding:12px 24px;gap:12px;}
    .logo{font-family:'Fredoka One',cursive;line-height:1;display:flex;flex-direction:column;align-items:flex-start;text-shadow:2px 2px 0 rgba(0,0,0,.2);flex-shrink:0;}
    .logo .glam{color:var(--pink-light);font-size:1rem;letter-spacing:2px;}
    .logo .brat{color:var(--blue-bright);font-size:1.4rem;}
    .logo .co{color:var(--yellow);font-size:.8rem;letter-spacing:3px;}
 
    .header-search{flex:1;max-width:380px;position:relative;}
    .search-input{width:100%;background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.28);border-radius:50px;padding:9px 18px 9px 40px;color:#fff;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;outline:none;transition:all .2s;}
    .search-input:focus{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.5);}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.7;}
 
    .header-actions{display:flex;align-items:center;gap:8px;}
    .icon-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.28);color:#fff;width:40px;height:40px;border-radius:12px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;}
    .cart-badge{position:absolute;top:-6px;right:-6px;background:var(--pink);color:#fff;font-size:.62rem;font-weight:900;min-width:19px;height:19px;border-radius:50px;display:flex;align-items:center;justify-content:center;border:2px solid #4e1a8a;}
 
    .header-nav{display:flex;gap:6px;padding:0 24px 12px;overflow-x:auto;scrollbar-width:none;}
    .cat-pill{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.22);color:rgba(255,255,255,.82);padding:5px 16px;border-radius:50px;font-weight:800;font-size:.78rem;cursor:pointer;white-space:nowrap;transition:all .18s;}
    .cat-pill.active{background:var(--pink);border-color:var(--pink-light);color:#fff;box-shadow:0 3px 14px rgba(232,56,154,.45);}
 
    /* ── GRID ── */
    .grid-wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:40px 24px 56px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px;}
    .card{background:rgba(255,255,255,.13);border:2px solid rgba(255,255,255,.26);border-radius:22px;overflow:hidden;backdrop-filter:blur(12px);display:flex;flex-direction:column;transition:transform .22s;cursor:pointer;}
    .card:hover{transform:translateY(-8px);border-color:rgba(255,255,255,.48);}
 
    .card-img-wrap{position:relative;background:#1a0835;height:210px;overflow:hidden;}
    .card-img{width:100%;height:100%;object-fit:contain;}
    .card-badge{position:absolute;top:10px;left:10px;font-size:.65rem;font-weight:900;padding:4px 10px;border-radius:50px;font-family:'Fredoka One',cursive;}
    .badge-new{background:var(--pink);color:#fff;}
 
    .card-body{padding:15px;display:flex;flex-direction:column;gap:4px;flex:1;}
    .card h3{font-family:'Fredoka One',cursive;font-size:1.1rem;color:#fff;}
    .price{font-family:'Fredoka One',cursive;font-size:1.08rem;color:var(--yellow);}
 
    /* ── MODAL ── */
    .modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(20,5,45,.78);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;padding:20px;}
    .modal-overlay.active{opacity:1;pointer-events:all;}
    .modal{background:linear-gradient(145deg,#3d1270,#5a1a9a);border:2px solid rgba(255,255,255,.28);border-radius:26px;overflow:hidden;max-width:480px;width:100%;position:relative;}
    .modal-img{width:100%;height:270px;object-fit:contain;background:#1a0835;display:block;}
    .modal-body{padding:22px 24px 28px;}
    .modal-title{font-family:'Fredoka One',cursive;font-size:1.75rem;color:#fff;margin-bottom:8px;}
    .modal-wa-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#25d366,#128c4e);color:#fff;padding:12px 22px;border-radius:50px;font-family:'Fredoka One',cursive;text-decoration:none;cursor:pointer;}
 
    @media(max-width:600px){
      .grid{grid-template-columns:1fr 1fr;gap:12px;}
      .card-img-wrap{height:155px;}
    }
  </style>
</head>
<body>
 
<header>
  <div class="header-top">
    <div class="logo">
      <span class="glam">&#10022; GLAM</span>
      <span class="brat">Brat</span>
      <span class="co">Co. &#128156;</span>
    </div>
    <div class="header-search">
      <span class="search-icon">&#128269;</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Buscar lentes...">
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="cartIconBtn">&#128722;<span class="cart-badge" id="cartBadge">0</span></button>
    </div>
  </div>
  <div class="header-nav">
    <button class="cat-pill active" data-cat="todos">Todo</button>
    <button class="cat-pill" data-cat="lentes">Lentes</button>
    <button class="cat-pill" data-cat="nuevos">Nuevos</button>
  </div>
</header>
 
<div class="grid-wrap">
  <div class="grid" id="productGrid"></div>
</div>
 
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button id="modalClose" style="position:absolute;top:10px;right:10px;background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;">&times;</button>
    <img class="modal-img" id="modalImg" src="" alt="">
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <p id="modalDesc" style="margin-bottom:15px;"></p>
      <div class="modal-footer" style="display:flex;justify-content:space-between;align-items:center;">
        <div class="modal-price" id="modalPrice" style="font-family:'Fredoka One';color:var(--yellow);font-size:1.5rem;"></div>
        <a class="modal-wa-btn" id="modalWaBtn" href="#" target="_blank">Pedir por WhatsApp</a>
      </div>
    </div>
  </div>
</div>
 
<script>
  // BASE DE DATOS COMPLETA CON 16 REFERENCIAS
  const PRODUCTOS = [
    { id:2, nombre:"Hybrid Kitten Green", categoria:"lentes", precio:35000, descripcion:"Verde vibrante con matices amarillos.", img:"lente-hybrid-kitten-green.jpeg", nuevo:false },
    { id:3, nombre:"Millennial Spice", categoria:"lentes", precio:35000, descripcion:"Gris moderno y elegante.", img:"lente-millennial-spice.jpeg", nuevo:false },
    { id:4, nombre:"Sugar Strike", categoria:"lentes", precio:35000, descripcion:"Marrón claro cálido y natural.", img:"lente-sugar-strike.jpeg", nuevo:false },
    { id:5, nombre:"Mermaid Brown", categoria:"lentes", precio:35000, descripcion:"Marrón con degradado sofisticado.", img:"lente-mermaid-brown.jpeg", nuevo:false },
    { id:6, nombre:"Tiffany", categoria:"lentes", precio:35000, descripcion:"Azul con matices amarillos.", img:"lente-tiffany.jpeg", nuevo:false },
    { id:7, nombre:"Seine Blue", categoria:"lentes", precio:35000, descripcion:"Azul-gris con degradado natural.", img:"lente-seine-blue.jpeg", nuevo:false },
    { id:8, nombre:"Verde Limón", categoria:"lentes", precio:35000, descripcion:"Verde fresco con aro oscuro.", img:"lente-verde-limon.jpeg", nuevo:false },
    { id:9, nombre:"Nicosia Blue", categoria:"lentes", precio:35000, descripcion:"Azul vibrante muy llamativo.", img:"lente-nicosia-blue.jpeg", nuevo:false },
    { id:10, nombre:"Sweet Secret Blue", categoria:"lentes", precio:35000, descripcion:"Azul-gris con detalles naturales.", img:"lente-sweet-secret-blue.jpeg", nuevo:false },
    { id:13, nombre:"DY-JY105 Light Blue", categoria:"lentes", precio:35000, descripcion:"Azul claro con aro marcado.", img:"lente-dy-jy105-light-blue.jpeg", nuevo:false },
    // NUEVAS REFERENCIAS INTEGRADAS
    { id:14, nombre:"Blackspot Blue", categoria:"lentes", precio:35000, descripcion:"Azul profundo con efecto elegante.", img:"blackspot-blue.jpg", nuevo:true },
    { id:15, nombre:"Bohemia Gray", categoria:"lentes", precio:36000, descripcion:"Gris sofisticado con aro oscuro natural.", img:"bohemia-gray.jpg", nuevo:true },
    { id:16, nombre:"Avatar Blue 2.0", categoria:"lentes", precio:37000, descripcion:"Azul brillante con matices celestes y anillo marrón.", img:"avatar-blue-2.0.jpg", nuevo:true },
    { id:17, nombre:"Estonia Gray", categoria:"lentes", precio:36000, descripcion:"Gris realista con degradado suave y textura detallada.", img:"estonia-gray.jpg", nuevo:true },
    { id:18, nombre:"Mirage Brown", categoria:"lentes", precio:34000, descripcion:"Marrón cálido con efecto natural y realce sutil.", img:"mirage-brown.jpg", nuevo:true },
    { id:19, nombre:"Pattaya Green", categoria:"lentes", precio:35000, descripcion:"Verde intenso y claro que ilumina la mirada.", img:"pattaya-green.jpg", nuevo:true }
  ];
 
  let searchTerm = "";
  let currentCat = "todos";
 
  function renderProducts() {
    const grid = document.getElementById('productGrid');
    const filtrados = PRODUCTOS.filter(p => {
      const matchCat = currentCat === "todos" || (currentCat === "nuevos" && p.nuevo) || p.categoria === currentCat;
      const matchSearch = p.nombre.toLowerCase().includes(searchTerm.toLowerCase());
      return matchCat && matchSearch;
    });
 
    grid.innerHTML = filtrados.map(p => `
      <div class="card" onclick="openModal(${p.id})">
        <div class="card-img-wrap">
          <img class="card-img" src="${p.img}" alt="${p.nombre}" onerror="this.src='https://placehold.co/400x300?text=Error+Imagen'">
          ${p.nuevo ? '<span class="card-badge badge-new">Nuevo</span>' : ''}
        </div>
        <div class="card-body">
          <h3>${p.nombre}</h3>
          <div class="price">$${p.precio.toLocaleString()} COP</div>
        </div>
      </div>
    `).join('');
  }
 
  function openModal(id) {
    const p = PRODUCTOS.find(x => x.id === id);
    if(!p) return;
    document.getElementById('modalImg').src = p.img;
    document.getElementById('modalTitle').innerText = p.nombre;
    document.getElementById('modalDesc').innerText = p.descripcion;
    document.getElementById('modalPrice').innerText = '$' + p.precio.toLocaleString() + ' COP';
    document.getElementById('modalWaBtn').href = `https://wa.me/573189653717?text=Hola! Quiero los lentes ${p.nombre}`;
    document.getElementById('modalOverlay').classList.add('active');
  }
 
  document.getElementById('modalClose').onclick = () => document.getElementById('modalOverlay').classList.remove('active');
  document.getElementById('searchInput').oninput = (e) => { searchTerm = e.target.value; renderProducts(); };
 
  document.querySelectorAll('.cat-pill').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      renderProducts();
    };
  });
 
  window.onload = renderProducts;
</script>
</body>
</html>
