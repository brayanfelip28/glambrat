<html lang="es">
<head>

    <title>GlamBrat Co. - Lentes, Pestañas y Accesorios</title>
    <style>
        /* Estilos CSS anteriores se mantienen igual */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fafafa;
            color: #333;
        }
        header {
            background-color: #ffb6c1; /* Rosa claro */
            color: white;
            text-align: center;
            padding: 20px 0;
        }
        header h1 {
            margin: 0;
            font-size: 2.5em;
        }
        /* La sección de estilos para .category-nav ha sido eliminada */
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
        }
        .category-title {
            text-align: center;
            color: #ff69b4; /* Rosa fuerte */
            margin-top: 40px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .product-card {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
            text-align: center;
            padding-bottom: 15px;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .product-card h3 {
            margin: 15px 0 5px;
            font-size: 1.2em;
            color: #555;
        }
        .product-card p {
            margin: 0 0 15px;
            font-weight: bold;
            color: #ff69b4;
            font-size: 1.1em;
        }
        .btn-whastapp {
            background-color: #25d366;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
            transition: background-color 0.3s ease;
        }
        .btn-whastapp:hover {
            background-color: #128c7e;
        }
        /* El estilo para footer ha sido eliminado */
    </style>
</head>
